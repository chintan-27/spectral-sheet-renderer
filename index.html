<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Spectral Sheet Renderer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      outline: none;
    }

    #debug-overlay {
      position: fixed;
      top: 12px;
      left: 12px;
      width: min(420px, calc(100vw - 24px));
      padding: 14px;
      box-sizing: border-box;
      color: #e8eef2;
      background: rgba(7, 10, 12, 0.84);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.34);
      font: 13px/1.42 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      pointer-events: none;
      white-space: normal;
    }

    #debug-overlay .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    #debug-overlay .title {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0;
    }

    #debug-overlay .subtitle,
    #debug-overlay .help,
    #debug-overlay .readout,
    #debug-overlay .grid span {
      color: #9fb0ba;
    }

    #debug-overlay .badge {
      max-width: 150px;
      padding: 3px 7px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      color: #dce8ee;
      background: rgba(255, 255, 255, 0.07);
      font-size: 11px;
      text-align: right;
    }

    #debug-overlay .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    #debug-overlay .grid div {
      min-width: 0;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.045);
    }

    #debug-overlay .grid span,
    #debug-overlay .grid strong {
      display: block;
      overflow-wrap: anywhere;
    }

    #debug-overlay .grid strong {
      margin-top: 2px;
      font-size: 12px;
    }

    #debug-overlay .meter {
      display: grid;
      grid-template-columns: 82px 36px 1fr;
      align-items: center;
      gap: 8px;
      margin: 7px 0;
    }

    #debug-overlay .meter b {
      color: #dce8ee;
      font-weight: 650;
      text-align: right;
    }

    #debug-overlay .meter i {
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.11);
    }

    #debug-overlay .meter em {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #59c7d8, #f4d35e, #ef6f6c);
    }

    #debug-overlay .readout {
      margin-top: 10px;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    #debug-overlay .help {
      margin-top: 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="800" height="600" tabindex="0"></canvas>
  <div id="debug-overlay"></div>
  <script>
    var Module = {
      canvas: document.getElementById('canvas')
    };
    Module.canvas.focus();
  </script>
  <script src="index.js"></script>
</body>
</html>
