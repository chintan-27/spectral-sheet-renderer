<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Spectral Sheet Renderer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      outline: none;
    }

    #debug-overlay {
      position: fixed;
      top: 12px;
      left: 12px;
      width: min(360px, calc(100vw - 24px));
      padding: 12px 14px;
      box-sizing: border-box;
      color: #e8eef2;
      background: rgba(7, 10, 12, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.16);
      font: 13px/1.42 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      pointer-events: none;
      white-space: normal;
    }

    #debug-overlay .title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    #debug-overlay .muted {
      color: #9fb0ba;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="800" height="600" tabindex="0"></canvas>
  <div id="debug-overlay"></div>
  <script>
    var Module = {
      canvas: document.getElementById('canvas')
    };
    Module.canvas.focus();
  </script>
  <script src="index.js"></script>
</body>
</html>
